services:
  memorydb:
    image: qdrant/qdrant:v1.15.4
    container_name: bonsai-mac-memorydb
    ports:
      - "6333:6333"
    volumes:
      - qdrant-mac-storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: bonsAI_server/Dockerfile
    container_name: bonsai-mac-backend
    environment:
      BONSAI_SERVER_ADDR: :8080
      BONSAI_STATIC_DIR: /app/static
      BONSAI_PUBLIC_API_BASE: ""
      BONSAI_LLM_CHAT_STREAM_URL: ${BONSAI_MAC_LLM_CHAT_STREAM_URL:-}
      BONSAI_LLM_MODEL: ${BONSAI_LLM_MODEL:-gemma-4-e2b-it}
      BONSAI_MEMORY_QDRANT_URL: http://memorydb:6333
      BONSAI_MEMORY_COLLECTION: bonsai-memory
      BONSAI_MEMORY_SEARCH_LIMIT: 3
      BONSAI_MEMORY_VECTOR_SIZE: 192
    depends_on:
      memorydb:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  qdrant-mac-storage:
